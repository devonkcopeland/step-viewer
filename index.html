<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0a0a0a" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts are self-hosted via @fontsource (see src/main.tsx). No
         third-party font CDN is contacted at runtime. -->
    <!--
      occt-import-js is NOT loaded here on purpose: it's ~31 KiB of
      render-blocking JS that's only needed once the user actually opens a
      STEP file. We lazy-inject it from `src/lib/occtLoader.ts` and warm it
      up at idle time. Keeping it off the critical path saves ~80 ms of LCP.
    -->
    <title>STEP Viewer — by finalrev</title>
    <!--
      Apply the persisted theme before React mounts to avoid a flash of the
      default look when reloading into e.g. brutalist/dark. Kept tiny +
      dependency-free; mirrors the resolution logic in
      src/lib/ThemeContext.tsx. Must be kept in sync with the theme ids in
      src/lib/themes.ts.
    -->
    <script>
      (function () {
        try {
          var THEMES = ["classic", "paper", "terminal", "brutalist"];
          var DEFAULT_THEME = "paper";
          var DEFAULT_MODE = "light";
          var themeId = localStorage.getItem("step-viewer/theme");
          if (!themeId || THEMES.indexOf(themeId) === -1)
            themeId = DEFAULT_THEME;
          var modePref = localStorage.getItem("step-viewer/theme-mode");
          if (modePref !== "light" && modePref !== "dark" && modePref !== "system")
            modePref = DEFAULT_MODE;
          var mode =
            modePref === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : modePref;
          var root = document.documentElement;
          root.setAttribute("data-theme", themeId);
          root.setAttribute("data-mode", mode);
          root.style.colorScheme = mode;
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
